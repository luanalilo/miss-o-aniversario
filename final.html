<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Feliz 22 Anos!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

        /* CENÁRIO */
        #palco {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('fundo.png') no-repeat center bottom;
            background-size: cover;
            image-rendering: pixelated;
        }

        /* CARRO (MAIOR) */
        #carro {
            position: absolute;
            bottom: 12%; right: -450px;
            width: 420px; 
            z-index: 10;
            transition: right 3s ease-out;
            image-rendering: pixelated;
        }

        /* PERSONAGEM (CORRIGIDA) */
        #boneca {
            position: absolute;
            bottom: 16%; left: 45%;
            width: 100px; height: 120px;
            background: url('personagem.png') no-repeat;
            background-size: 600px 240px;
            background-position: -210px -10px; /* Frame parada */
            z-index: 20; /* Na frente do carro */
            opacity: 0; /* Começa invisível para não dar erro de render */
            transform: scaleX(-1); 
            image-rendering: pixelated;
            transition: opacity 0.5s;
        }

        /* ENVELOPE PIXELADO */
        #envelope-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 30;
            display: none;
            cursor: pointer;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .envelope-body {
            width: 150px; height: 100px;
            background: #d2b48c;
            border: 4px solid #8b4513;
            position: relative;
        }
        .envelope-flap {
            position: absolute; top: 0; left: 0;
            width: 0; height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-top: 50px solid #a0522d;
            transition: transform 0.5s;
            transform-origin: top;
        }

        /* CARTA */
        #carta {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 550px;
            height: 80vh;
            background: #fff;
            border: 6px solid #333;
            padding: 25px;
            display: none;
            z-index: 40;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.4);
            flex-direction: column;
        }
        #texto-area {
            flex-grow: 1;
            overflow-y: auto;
            color: #222;
            font-size: 17px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        #btn-lido {
            background: #ff4757; color: #fff;
            border: none; padding: 15px;
            font-weight: bold; cursor: pointer;
            margin-top: 15px; display: none;
        }
    </style>
</head>
<body>

<audio id="musica" src="musica.mp3" loop></audio>

<div id="palco">
    <img src="carro.png" id="carro">
    <div id="boneca"></div>

    <div id="envelope-wrapper" onclick="abrirCarta()">
        <div class="envelope-body">
            <div class="envelope-flap" id="aba"></div>
        </div>
    </div>

    <div id="carta">
        <div id="texto-area"></div>
        <button id="btn-lido" onclick="finalizar()">LIDO</button>
    </div>
</div>
