<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Final do Desafio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            font-family: 'Courier New', Courier, monospace; /* Fonte mais "computacional" */
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PALCO PRINCIPAL */
        #cenario {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('fundo.png') no-repeat center bottom;
            background-size: cover;
            image-rendering: pixelated; /* Mantém o estilo pixel art nítido */
        }

        /* CARRO */
        #carro {
            position: absolute;
            bottom: 15%; /* Ajuste conforme a sua estrada na imagem fundo.png */
            right: -300px;
            width: 250px;
            transition: right 3s ease-out;
            z-index: 10;
        }

        /* PERSONAGEM */
        #personagem {
            position: absolute;
            bottom: 18%;
            left: 50%;
            width: 80px; /* Ajuste conforme o tamanho do frame */
            height: 100px; /* Ajuste conforme o tamanho do frame */
            background: url('personagem.png') no-repeat;
            background-size: 500px 200px; /* Tamanho total da sua imagem spritesheet */
            background-position: -10px -10px; /* Posição do primeiro frame */
            display: none;
            z-index: 5;
            transform: scaleX(-1); /* Inverte o lado para olhar para a esquerda */
        }

        /* ENVELOPE */
        #envelope-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        #envelope-img {
            width: 200px;
            image-rendering: pixelated;
        }

        /* CARTA */
        #carta {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 500px;
            height: 400px;
            background: #fdfdfd;
            border: 4px solid #333;
            padding: 30px;
            display: none;
            z-index: 30;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            flex-direction: column;
            justify-content: space-between;
        }

        #texto-carta {
            color: #333;
            font-size: 18px;
            line-height: 1.4;
            text-align: left;
            overflow-y: auto;
        }

        button#btn-lido {
            background: #2ecc71;
            border: none;
            padding: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }

    </style>
</head>
<body>

    <audio id="musica" src="musica.mp3" loop></audio>

    <div id="cenario">
        <img src="carro.png" id="carro" alt="Carro">
        <div id="personagem"></div>
        
        <div id="envelope-container">
            <img src="envelope.png" id="envelope-img" alt="Envelope">
        </div>

        <div id="carta">
            <div id="texto-carta"></div>
            <button id="btn-lido" onclick="finalizarTudo()">LIDO</button>
        </div>
    </div>

    <script>
        const carro = document.getElementById('carro');
        const personagem = document.getElementById('personagem');
        const envelope = document.getElementById('envelope-container');
        const carta = document.getElementById('carta');
        const textoDiv = document.getElementById('texto-carta');
        const musica = document.getElementById('musica');
        const btnLido = document.getElementById('btn-lido');

        const mensagem = `Amor,\n\nEu fiquei pensando em como começar essa carta… e a verdade é que eu não estou escrevendo porque estou no auge do romantismo. Estou escrevendo porque você é importante pra mim, e quando algo é importante, eu escolho cuidar.\n\nEu admiro você. Admiro o homem que você é, a forma como cuida de mim, a sua força, a sua disciplina, a maneira como você não desiste das coisas.\n\nVocê é um homem incrível, e eu tenho muito orgulho de caminhar ao seu lado.`;

        // 1. Início: Carro entra em cena
        window.onload = () => {
            setTimeout(() => {
                carro.style.right = '40%'; // Carro para no centro
            }, 500);
        };

        // 2. Quando o carro para, a personagem sai
        carro.addEventListener('transitionend', () => {
            if (carro.style.right === '40%') {
                setTimeout(sairDoCarro, 500);
            }
        });

        function sairDoCarro() {
            personagem.style.display = 'block';
            // Simulação de movimento saindo do carro
            setTimeout(() => {
                personagem.style.left = '42%'; 
                mostrarEnvelope();
            }, 800);
        }

        function mostrarEnvelope() {
            envelope.style.display = 'block';
            setTimeout(() => {
                envelope.style.transform = 'translate(-50%, -50%) scale(2)'; // Envelope cresce
                
                // Clique para abrir o envelope
                envelope.onclick = () => {
                    envelope.style.display = 'none';
                    abrirCarta();
                };
            }, 500);
        }

        function abrirCarta() {
            carta.style.display = 'flex';
            musica.play();
            digitarTexto(0);
        }

        function digitarTexto(i) {
            if (i < mensagem.length) {
                textoDiv.innerHTML += mensagem.charAt(i).replace(/\n/g, '<br>');
                setTimeout(() => digitarTexto(i + 1), 50); // Velocidade da digitação
            } else {
                btnLido.style.display = 'block';
            }
        }

        function finalizarTudo() {
            carta.style.display = 'none';
            // Personagem manda beijo (aqui você poderia mudar o frame do sprite)
            personagem.style.transform = 'scaleX(-1) translateY(-10px)'; // Pulinho de beijo
            
            setTimeout(() => {
                personagem.style.display = 'none'; // Personagem "entra" no carro
                carro.style.transition = 'right 2s ease-in';
                carro.style.right = '120%'; // Carro vai embora para a esquerda
            }, 1500);
        }
    </script>
</body>
</html>
