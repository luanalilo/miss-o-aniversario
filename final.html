<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#fundo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#carro{
position:absolute;
bottom:120px;
left:-300px;
width:300px;
}

#envelope{
position:absolute;
bottom:220px;
left:50%;
transform:translateX(-50%) scale(0);
width:120px;
cursor:pointer;
}

#carta{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:500px;
}

#texto{
position:absolute;
top:55%;
left:50%;
transform:translateX(-50%);
width:420px;
color:black;
font-family:Courier New;
font-size:18px;
text-align:center;
white-space:pre-line;
}

</style>
</head>

<body>

<img src="fundo.png" id="fundo">
<img src="carro.png" id="carro">
<img src="envelope.png" id="envelope">
<img src="carta.png" id="carta">

<div id="texto"></div>

<audio id="musica" src="musica.mp3"></audio>

<script>

let carro = document.getElementById("carro")
let envelope = document.getElementById("envelope")
let carta = document.getElementById("carta")
let texto = document.getElementById("texto")
let musica = document.getElementById("musica")

let pos = -300

let movimento = setInterval(()=>{

pos += 2
carro.style.left = pos + "px"

if(pos >= window.innerWidth/2 - 150){

clearInterval(movimento)

setTimeout(()=>{
envelope.style.transform="translateX(-50%) scale(1)"
},1000)

}

},16)

envelope.onclick = ()=>{

envelope.style.display="none"

carta.style.transform="translate(-50%,-50%) scale(1)"

musica.play()

let mensagem = `Amor,

Hoje você completa 22 anos, e eu não poderia deixar esse dia passar sem te escrever algumas palavras.

Eu admiro muito você. Admiro a sua inteligência, a forma como você pensa, a maneira como se dedica às coisas que quer conquistar. Você é um homem muito inteligente, mas mais do que isso, você é um homem bom. Um bom homem, um bom amigo, alguém em quem as pessoas podem confiar. Isso é algo muito bonito de se ver e é uma das coisas que mais me faz ter orgulho de você.

Eu torço muito pelo seu sucesso, de verdade. Quero ver você conquistando tudo aquilo que sonha, crescendo, realizando seus planos e se tornando cada vez mais a pessoa incrível que você já é. Você merece coisas boas nessa vida.

Também preciso dizer algo que talvez você já saiba: você é o homem mais lindo do mundo para mim. E eu sou muito apaixonada por você. Estar ao seu lado é algo que eu valorizo muito, e sou muito grata por poder compartilhar a vida com você.

Nesse novo ciclo que começa hoje, eu desejo que você tenha muitos e muitos anos prósperos, cheios de conquistas, paz e felicidade. Desejo também que Deus encontre o seu coraçãozinho, cuide de você, te guie e te faça muito feliz.

E que venham muitos aniversários ainda… de preferência comigo ao seu lado.

Feliz 22 anos, meu amor.

Com todo o meu carinho.`

let i = 0

let digitando = setInterval(()=>{

texto.innerHTML += mensagem[i]

i++

if(i>=mensagem.length){
clearInterval(digitando)
}

},50)

}

</script>

</body>
</html>
