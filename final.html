<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Feliz 22 Anos!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; font-family: 'Courier New', monospace; }

        #palco {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('fundo.png') no-repeat center bottom;
            background-size: cover;
            image-rendering: pixelated;
        }

        #carro {
            position: absolute;
            bottom: 12%; right: -550px;
            width: 450px; 
            z-index: 50; /* Carro no meio */
            transition: right 3s ease-out;
            image-rendering: pixelated;
        }

        #boneca {
            position: absolute;
            bottom: 16%; left: 45%;
            width: 100px; height: 120px;
            background: url('personagem.png') no-repeat;
            background-size: 600px 240px;
            background-position: -210px -10px;
            z-index: 100; /* BONECA NA FRENTE DE TUDO */
            visibility: hidden; /* Pré-carregada mas oculta */
            transform: scaleX(-1); 
            image-rendering: pixelated;
        }

        #envelope-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 200;
            display: none;
            cursor: pointer;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .envelope-body { width: 180px; height: 120px; background: #d2b48c; border: 4px solid #8b4513; position: relative; }
        .envelope-flap { position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 90px solid transparent; border-right: 90px solid transparent; border-top: 60px solid #a0522d; transition: transform 0.5s; transform-origin: top; }

        #carta {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 550px;
            height: 80vh; background: #fff; border: 6px solid #333; padding: 25px;
            display: none; z-index: 300; flex-direction: column;
            box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
        }

        #texto-area { flex-grow: 1; overflow-y: auto; color: #222; font-size: 18px; line-height: 1.6; white-space: pre-wrap; text-align: left; }
        #btn-lido { background: #ff4757; color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<audio id="musica" src="musica.mp3" preload="auto" loop></audio>

<div id="palco">
    <img src="carro.png" id="carro">
    <div id="boneca"></div>
    
    <div id="envelope-wrapper" onclick="abrirCarta()">
        <div class="envelope-body"><div class="envelope-flap" id="aba"></div></div>
    </div>

    <div id="carta">
        <div id="texto-area"></div>
        <button id="btn-lido" onclick="finalizar()">LIDO</button>
    </div>
</div>

<script>
    const carro = document.getElementById('carro');
    const boneca = document.getElementById('boneca');
    const envelope = document.getElementById('envelope-wrapper');
    const aba = document.getElementById('aba');
    const carta = document.getElementById('carta');
    const textoArea = document.getElementById('texto-area');
    const musica = document.getElementById('musica');
    const btnLido = document.getElementById('btn-lido');

    const textoFinal = `Amor,
Hoje você completa 22 anos, e eu não poderia deixar esse dia passar sem te escrever algumas palavras.
Eu admiro muito você. Admiro a sua inteligência, a forma como você pensa, a maneira como se dedica às coisas que quer conquistar. Você é um homem muito inteligente, mas mais do que isso, você é um homem bom. Um bom homem, um bom amigo, alguém em quem as pessoas podem confiar. Isso é algo muito bonito de se ver e é uma das coisas que mais me faz ter orgulho de você.
Eu torço muito pelo seu sucesso, de verdade. Quero ver você conquistando tudo aquilo que sonha, crescendo, realizando seus planos e se tornando cada vez mais a pessoa incrível que você já é. Você merece coisas boas nessa vida.
Também preciso dizer algo que talvez você já saiba: você é o homem mais lindo do mundo para mim. E eu sou muito apaixonada por você. Estar ao seu lado é algo que eu valorizo muito, e sou muito grata por poder compartilhar a vida com você.
Nesse novo ciclo que começa hoje, eu desejo que você tenha muitos e muitos anos prósperos, cheios de conquistas, paz e felicidade. Desejo também que Deus encontre o seu coraçãozinho, cuide de você, te guie e te faça muito feliz.
E que venham muitos aniversários ainda… de preferência comigo ao seu lado.

Feliz 22 anos, meu amor.
Com todo o meu carinho.`;

    // 1. Carro entra
    window.onload = () => {
        setTimeout(() => { carro.style.right = '30%'; }, 800);
    };

    // 2. Quando o carro para, a boneca aparece
    carro.addEventListener('transitionend', (e) => {
        if(e.propertyName === 'right' && (carro.style.right === '30%' || carro.style.right === '35%')) {
            boneca.style.visibility = 'visible'; // Torna visível
            setTimeout(mostrarEnvelope, 1000);
        }
    });

    function mostrarEnvelope() {
        envelope.style.display = 'block';
        setTimeout(() => { envelope.style.transform = 'translate(-50%, -50%) scale(2.2)'; }, 100);
    }

    // 3. Abrir carta e tocar música
    function abrirCarta() {
        musica.play().catch(err => console.log("Áudio bloqueado pelo navegador"));
        aba.style.transform = 'rotateX(180deg)';
        setTimeout(() => {
            envelope.style.display = 'none';
            carta.style.display = 'flex';
            digitar(0);
        }, 700);
    }

    function digitar(i) {
        if (i < textoFinal.length) {
            textoArea.innerHTML += textoFinal.charAt(i);
            textoArea.scrollTop = textoArea.scrollHeight;
            setTimeout(() => digitar(i + 1), 40);
        } else {
            btnLido.style.display = 'block';
        }
    }

    function finalizar() {
        carta.style.display = 'none';
        // Frame do beijo (ajuste se necessário)
        boneca.style.backgroundPosition = '-420px -10px'; 
        setTimeout(() => {
            boneca.style.visibility = 'hidden';
            carro.style.transition = 'right 2s ease-in';
            carro.style.right = '120%'; 
        }, 1500);
    }
</script>
</body>
</html>
