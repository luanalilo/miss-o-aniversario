<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#fundo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#carro{
position:absolute;
bottom:120px;
right:-350px;
width:300px;
}

#personagem{
position:absolute;
bottom:120px;
right:240px;
width:40px;
height:60px;
display:none;
}

#envelope{
position:absolute;
bottom:230px;
left:50%;
transform:translateX(-50%) scale(0);
width:120px;
height:80px;
background:#f5f5f5;
border:3px solid #444;
display:none;
}

#carta{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:560px;
height:420px;
background:#fffdf5;
border:4px solid #ccc;
padding:40px;
box-sizing:border-box;
display:none;
}

#texto{
white-space:pre-line;
color:#222;
font-size:18px;
}

#botaoLido{

margin-top:20px;
padding:10px 20px;
font-size:16px;
border:none;
background:#ff69b4;
color:white;
cursor:pointer;
display:none;

}

.pixel{
image-rendering: pixelated;
}

</style>
</head>

<body>

<img src="fundo.png" id="fundo">

<img src="carro.png" id="carro" class="pixel">

<div id="personagem" class="pixel"></div>

<div id="envelope"></div>

<div id="carta">
<div id="texto"></div>
<button id="botaoLido" onclick="finalizar()">LIDO</button>
</div>

<audio id="musica" src="musica.mp3"></audio>

<script>

let carro = document.getElementById("carro")
let personagem = document.getElementById("personagem")
let envelope = document.getElementById("envelope")
let carta = document.getElementById("carta")
let texto = document.getElementById("texto")
let musica = document.getElementById("musica")
let botaoLido = document.getElementById("botaoLido")

/* PERSONAGEM PIXEL */

personagem.innerHTML = `
<div style="width:40px;height:10px;background:#5a3a1a;"></div>
<div style="width:40px;height:20px;background:#ffd8b1;"></div>
<div style="width:40px;height:20px;background:pink;"></div>
<div style="width:40px;height:10px;background:#5a3a1a;"></div>
`

/* CARRO ENTRA */

let pos = -350

let movimento = setInterval(()=>{

pos += 2
carro.style.right = pos + "px"

if(pos >= window.innerWidth/2 - 450){

clearInterval(movimento)

setTimeout(sairDoCarro,800)

}

},16)

/* PERSONAGEM SAI */

function sairDoCarro(){

personagem.style.display="block"

let p = 240

let andando = setInterval(()=>{

p += 1
personagem.style.right = p + "px"

if(p >= window.innerWidth/2 - 120){

clearInterval(andando)

mostrarEnvelope()

}

},16)

}

/* ENVELOPE */

function mostrarEnvelope(){

envelope.style.display="block"

let escala = 0

let anim = setInterval(()=>{

escala += 0.03

envelope.style.transform = "translateX(-50%) scale("+escala+")"

if(escala >= 6){

clearInterval(anim)

abrirCarta()

}

},16)

}

/* CARTA */

function abrirCarta(){

musica.play()

carta.style.display="block"

let escala = 0

let anim = setInterval(()=>{

escala += 0.03

carta.style.transform="translate(-50%,-50%) scale("+escala+")"

if(escala >= 1){

clearInterval(anim)

digitar()

}

},16)

}

/* DIGITAR TEXTO */

function digitar(){

let mensagem = `Amor,

Hoje você completa 22 anos, e eu não poderia deixar esse dia passar sem te escrever algumas palavras.

Eu admiro muito você. Admiro a sua inteligência, a forma como você pensa, a maneira como se dedica às coisas que quer conquistar.

Eu torço muito pelo seu sucesso, de verdade.

Também preciso dizer algo que talvez você já saiba: você é o homem mais lindo do mundo para mim. E eu sou muito apaixonada por você.

Feliz 22 anos, meu amor.

Com todo o meu carinho.`

let i = 0

let intervalo = setInterval(()=>{

texto.innerHTML += mensagem[i]

i++

if(i >= mensagem.length){

clearInterval(intervalo)

botaoLido.style.display="inline-block"

}

},40)

}

/* FINAL */

function finalizar(){

carta.style.display="none"

let p = parseInt(personagem.style.right)

let voltar = setInterval(()=>{

p -= 1
personagem.style.right = p + "px"

if(p <= 240){

clearInterval(voltar)

personagem.style.display="none"

irEmbora()

}

},16)

}

function irEmbora(){

let posCarro = pos

let sair = setInterval(()=>{

posCarro += 3
carro.style.right = posCarro + "px"

if(posCarro >= window.innerWidth + 400){

clearInterval(sair)

}

},16)

}

</script>

</body>
</html>
